<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0b0f3a;
        color: white;
    }

    /* Navbar */
    .navbar {
        display: flex;
        justify-content: space-between;
        padding: 15px 40px;
        background: black;
    }

    .navbar a {
        color: #00c8ff;
        text-decoration: none;
        margin-left: 20px;
    }

    /* Main Section */
    .container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 60px;
    }

    /* Contact Box */
    .contact-box {
        max-width: 400px;
    }

    .contact-box h1 {
        font-size: 40px;
        margin-bottom: 30px;
    }

    .contact-box input {
        display: block;
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: none;
        background: #ccc;
        font-size: 16px;
    }

    .slider {
        width: 250px;
        height: 300px;
        position: relative;
        overflow: hidden;
    }

    .slider img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        opacity: 0;
        transition: opacity 0.8s ease;
        border-radius: 5px;
    }

    .slider img.active {
        opacity: 1;
    }

    .submit-btn {
    width: 100%;
    padding: 12px;
    background: #00c8ff;
    border: none;
    color: black;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}

.submit-btn:hover {
    background: #009ecf;
}
</style>

</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div><strong>Shrayash.dev</strong></div>
    <div>
        <a href="About.html">About</a>
        <a href="Interests.html">Interest</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- Contact Section -->
<div class="container">

    <div class="contact-box">
        <h1>Contact Me</h1>
        <input type="text" placeholder="Enter Name">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Phone">
        <button class="submit-btn">Submit</button>
    </div>

    <div class="image">
        <img src="solphin.png">
    </div>

</div>


</body>
</html>
